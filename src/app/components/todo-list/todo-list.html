<app-todo-form />

<div class="grid grid-cols-3 gap-4">
    @for (todo of todos(); track todo.id) {
        <app-todo-card
            [todo]="todo"
            (toggle)="onToggle($event)"
            (delete)="onDelete($event)"
        />
    } @empty {
        <p class="text-gray-500">Nessun task presente</p>
    }
</div>
