<app-todo-form [editingTodo]="editingTodo()" (closed)="onFormClosed()" />

<div class="toolbar">
    <div class="tabs glass">
        <button class="tab" [class.tab--active]="activeTab() === 'active'" (click)="setTab('active')">
            Active Task
        </button>
        <button class="tab" [class.tab--active]="activeTab() === 'completed'" (click)="setTab('completed')">
            Completed
        </button>
    </div>

    <div class="search-input">
        <app-icon name="search" [size]="16" />
        <input type="text" placeholder="Search List" [value]="searchQuery()"
            (input)="onSearchChange($any($event.target).value)" />
    </div>
</div>

<div cdkDropList [cdkDropListDisabled]="!canReorder()" (cdkDropListDropped)="onDrop($event)" class="todo-grid">
    @for (todo of visibleTodos(); track todo.id) {
    <div cdkDrag [cdkDragDisabled]="!canReorder()">
        <app-todo-card [todo]="todo" (toggle)="onToggle($event)" (delete)="onDelete($event)" (edit)="onEdit(todo)" />
    </div>
    } @empty {
    <div class="empty-state">
        <app-icon name="list-checks" [size]="32" />
        <p>Nessun task presente</p>
    </div>
    }
</div>
