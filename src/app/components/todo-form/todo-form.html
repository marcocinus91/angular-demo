<div class="mb-6">
    @if (!isOpen) {
    <button (click)="toggleOpen()"
        class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">
        + Add New List
    </button>
    } @else {
    <form [formGroup]="form" (ngSubmit)="onSubmit()"
        class="bg-white p-4 rounded-xl border border-gray-200 flex flex-col gap-3 max-w-md">

        <div>
            <input formControlName="title" placeholder="Titolo"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" />
            @if (form.get('title')?.touched && form.get('title')?.invalid) {
            <span class="text-xs text-red-500">Titolo obbligatorio (min 3 caratteri)</span>
            }
        </div>

        <div>
            <textarea formControlName="description" placeholder="Descrizione" rows="2"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></textarea>
            @if (form.get('description')?.touched && form.get('description')?.invalid) {
            <span class="text-xs text-red-500">Descrizione obbligatoria</span>
            }
        </div>

        <select formControlName="color" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
            @for (c of colors; track c) {
            <option [value]="c">{{ c }}</option>
            }
        </select>

        <select formControlName="assignedTo" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
            <option [value]="null">Non assegnato</option>
            @for (mate of teamMate(); track mate.id) {
            <option [value]="mate.id">{{ mate.name }}</option>
            }
        </select>

        <div class="flex gap-2">
            <button type="submit"
                class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">
                Salva
            </button>
            <button type="button" (click)="toggleOpen()" class="px-4 py-2 text-gray-600 text-sm">
                Annulla
            </button>
        </div>
    </form>
    }
</div>
