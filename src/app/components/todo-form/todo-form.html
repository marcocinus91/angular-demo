<div class="todo-form-wrap">
    @if (!isOpen) {
    <app-button variant="primary" (click)="toggleOpen()">
        <app-icon icon name="plus" [size]="16" />
        Add New List
    </app-button>
    } @else {
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="todo-form glass-strong">

        <div class="field">
            <input formControlName="title" placeholder="Titolo" class="field-input" />
            @if (form.get('title')?.touched && form.get('title')?.invalid) {
            <span class="field-error">Titolo obbligatorio (min 3 caratteri)</span>
            }
        </div>

        <div class="field">
            <textarea formControlName="description" placeholder="Descrizione" rows="2" class="field-input"></textarea>
            @if (form.get('description')?.touched && form.get('description')?.invalid) {
            <span class="field-error">Descrizione obbligatoria</span>
            }
        </div>

        <select formControlName="color" class="field-input">
            @for (c of colors; track c) {
            <option [value]="c">{{ c }}</option>
            }
        </select>

        <select formControlName="assignedTo" class="field-input">
            <option [value]="null">Non assegnato</option>
            @for (mate of teamMate(); track mate.id) {
            <option [value]="mate.id">{{ mate.name }}</option>
            }
        </select>

        <div class="form-actions">
            <app-button type="submit" variant="primary" size="sm">Salva</app-button>
            <app-button type="button" variant="ghost" size="sm" (click)="toggleOpen()">Annulla</app-button>
        </div>
    </form>
    }
</div>
