<div class="overview">

    <div class="stats-grid">
        @for (stat of stats(); track stat.label) {
        <div class="stat-card glass">
            <div class="stat-card-top">
                <span class="stat-label">{{ stat.label }}</span>
                <span class="stat-icon">
                    <app-icon [name]="stat.icon" [size]="15" />
                </span>
            </div>
            <span class="stat-value">{{ stat.value }}</span>
        </div>
        }
    </div>

    <div class="panel glass">
        <div class="progress-header">
            <span class="progress-label">Completamento</span>
            <span class="progress-value">{{ completionRate() }}%</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" [style.width.%]="completionRate()"></div>
        </div>
    </div>

    <div class="panel glass">
        <p class="panel-title">Task assegnati per membro</p>
        <div class="member-list">
            @for (item of todosByMember(); track item.mate.id) {
            <div class="member-row">
                <span class="member-name">{{ item.mate.name }}</span>
                <span class="member-count">{{ item.count }}</span>
            </div>
            } @empty {
            <p class="member-empty">Nessun membro nel team</p>
            }
        </div>
    </div>
</div>
