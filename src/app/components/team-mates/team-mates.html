<div class="mates-grid">
    @for (mate of teamMates(); track mate.id) {
        <div class="mate-card glass">
            <app-avatar [name]="mate.name" [color]="mate.avatarColor" [size]="46" />
            <div>
                <p class="mate-name">{{ mate.name }}</p>
                <p class="mate-role">{{ mate.role }}</p>
            </div>
        </div>
    }
</div>
