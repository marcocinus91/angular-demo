<div class="shell">
  @if (sidebarOpen()) {
    <div class="mobile-overlay" (click)="toggleSidebar()"></div>
  }

  <aside class="sidebar glass" [class.sidebar--open]="sidebarOpen()">
    <div class="brand">
      <div class="brand-mark"></div>
      <span class="brand-name">HealDocs</span>
    </div>

    <nav class="nav">
      <a routerLink="/overview" routerLinkActive="nav-link--active" class="nav-link">
        <app-icon name="layout-dashboard" [size]="17" />
        Overview
      </a>
      <a routerLink="/team-mates" routerLinkActive="nav-link--active" class="nav-link">
        <app-icon name="users" [size]="17" />
        Team Mates
      </a>
      <a routerLink="/todo-list" routerLinkActive="nav-link--active" class="nav-link">
        <app-icon name="list-checks" [size]="17" />
        Todo List
      </a>
    </nav>
  </aside>

  <div class="content-column">
    <header class="header glass">
      <div class="header-left">
        <app-icon-button class="menu-toggle" title="Menu" (click)="toggleSidebar()">
          <app-icon name="menu" [size]="18" />
        </app-icon-button>
        <h1 class="page-title">{{ pageTitle() }}</h1>
      </div>
      <div class="header-right">
        <button
          class="theme-toggle"
          [class.theme-toggle--dark]="theme() === 'dark'"
          (click)="toggleTheme()"
          aria-label="Toggle theme"
        >
          <span class="theme-toggle-knob">
            <app-icon [name]="theme() === 'dark' ? 'moon' : 'sun'" [size]="13" />
          </span>
        </button>
        <app-icon-button title="Notifications">
          <app-icon name="bell" [size]="17" />
        </app-icon-button>
        <app-avatar name="Marco Cinus" [size]="38" />
      </div>
    </header>

    <main class="main">
      <router-outlet />
    </main>
  </div>
</div>
